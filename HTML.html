<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Algoritmo de Cohen-Sutherland</title>

<style>

body{
    font-family: Arial;
    text-align:center;
}

canvas{
    border:1px solid black;
    margin-top:20px;
}

input{
    width:60px;
    margin:5px;
}

button{
    margin:10px;
    padding:8px 15px;
}

</style>
</head>

<body>

<h2>Algoritmo de Cohen-Sutherland</h2>

<!-- Coordenadas de la ventana de recorte -->
<div>

    Xmin:
    <input id="xmin" type="number" value="100">

    Ymin:
    <input id="ymin" type="number" value="100">

    Xmax:
    <input id="xmax" type="number" value="400">

    Ymax:
    <input id="ymax" type="number" value="400">

</div>

<br>

<!-- Navegación de escenas -->
<button onclick="anterior()">
    Anterior
</button>

<button onclick="siguiente()">
    Siguiente
</button>

<button onclick="render()">
    Actualizar
</button>

<!-- Información -->
<p id="info"></p>

<!-- Canvas -->
<canvas id="canvas" width="600" height="600"></canvas>

<script src="script.js"></script>

</body>
</html>
